# .github/workflows/release.yaml — publish to crates.io + GitHub Release on tag push.
#
#   * verify-version — the git tag is the single source of truth; refuse to
#     publish if Cargo.toml's version doesn't match the tag.
#   * crates-io      — publish via OIDC Trusted Publishing (no stored token).
#   * sbom           — SPDX + CycloneDX, attached to the release.
#   * github-release — notes + SBOMs.
#
# ss7-mtp3 is a pure-Rust crate — there are no wheels, no PyPI, no maturin.
#
# PREREQUISITE for the crates-io job: own `ss7-mtp3` on crates.io and configure
# Trusted Publishing (OIDC) on the crate, pointing at this repo + this workflow.
# The first publish of a brand-new crate needs a one-shot `publish-new` token
# (Trusted Publishing can't bootstrap a crate that doesn't exist yet).
name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cargo version must equal the tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "tag=$tag_version cargo=$cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag ($tag_version) — bump version in the release commit."
            exit 1
          fi

  crates-io:
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint a short-lived crates.io token via GitHub OIDC — no stored secret
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Idempotent: the brand-new crate's first version is bootstrapped with a
      # one-shot manual `cargo publish` (Trusted Publishing can't create a crate
      # that doesn't exist yet). If this tag's version is already on crates.io,
      # skip — so re-running a tag, or tagging the bootstrap release, stays green.
      - name: Already on crates.io?
        id: check
        # crates.io returns 403 to requests without a descriptive User-Agent, so
        # the -A header is mandatory (a bare curl would 403 and look "unpublished").
        run: |
          ver="${GITHUB_REF_NAME#v}"
          ua="ss7-mtp3-release-ci (github.com/Real-Time-Telecom-B-V/ss7-mtp3)"
          if curl -sf -A "$ua" "https://crates.io/api/v1/crates/ss7-mtp3/${ver}" -o /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ss7-mtp3 ${ver} already on crates.io — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Authenticate to crates.io (OIDC Trusted Publishing)
        if: steps.check.outputs.exists == 'false'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  sbom:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-sbom
        run: cargo install cargo-sbom
      - name: Generate SPDX + CycloneDX SBOMs
        run: |
          cargo sbom --output-format spdx_json_2_3 > "ss7-mtp3-${GITHUB_REF_NAME}.spdx.json"
          cargo sbom --output-format cyclone_dx_json_1_4 > "ss7-mtp3-${GITHUB_REF_NAME}.cdx.json"
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            ss7-mtp3-*.spdx.json
            ss7-mtp3-*.cdx.json

  github-release:
    needs: [crates-io, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v7
      - name: Download SBOMs
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.spdx.json
            artifacts/*.cdx.json
